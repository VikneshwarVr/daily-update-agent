name: Daily Learning Notification

on:
  schedule:
    # 8:00 AM IST -> 2:30 UTC
    - cron: '30 2 * * *'
    # 1:00 PM IST -> 7:30 UTC
    - cron: '30 7 * * *'
    # 4:30 PM IST -> 11:00 UTC
    - cron: '0 11 * * *'
    # 10:00 PM IST -> 16:30 UTC
    - cron: '30 16 * * *'
  workflow_dispatch:        # allows manual trigger from GitHub UI anytime

jobs:
  send-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node agent.js
